# mxcentral-for-iRedmail sudoers include.
#
# Install with visudo, for example:
#   visudo -cf /opt/www/mxcentral-for-iRedmail/docs/sudoers.conf
#   install -o root -g root -m 0440 /opt/www/mxcentral-for-iRedmail/docs/sudoers.conf /etc/sudoers.d/mxcentral-for-iRedmail
#
# Do not install this as a filename containing a dot, for example mxcentral.conf.
# sudo @includedir ignores files with dots in their names on common sudo builds.
#
# This file assumes the PHP-FPM/nginx worker runs as www-data.
# It grants only fixed service commands and fixed iRedMail file setup commands.

Defaults:www-data !requiretty

# DKIM key generation and amavisd DKIM checks.
# Matching .env values:
#   AMAVISD_GENRSA_COMMAND="/usr/bin/sudo /usr/sbin/amavisd genrsa"
#   AMAVISD_SHOWKEYS_COMMAND="/usr/bin/sudo /usr/sbin/amavisd showkeys"
#   AMAVISD_TESTKEYS_COMMAND="/usr/bin/sudo /usr/sbin/amavisd testkeys"
#   AMAVISD_RESTART_COMMAND="/usr/bin/sudo /usr/bin/systemctl restart amavis.service"
#   AMAVISD_DKIM_CHOWN_COMMAND="/usr/bin/sudo /usr/bin/chown"
#   AMAVISD_DKIM_CHMOD_COMMAND="/usr/bin/sudo /usr/bin/chmod"
Cmnd_Alias MXC_AMAVISD = \
    /usr/sbin/amavisd genrsa /var/lib/dkim/*.pem 1024, \
    /usr/sbin/amavisd genrsa /var/lib/dkim/*.pem 2048, \
    /usr/sbin/amavisd showkeys, \
    /usr/sbin/amavisd testkeys, \
    /usr/bin/chown amavis\:amavis /var/lib/dkim/*.pem, \
    /usr/bin/chmod 0400 /var/lib/dkim/*.pem, \
    /usr/bin/systemctl restart amavis.service, \
    /usr/bin/systemctl restart amavisd.service

# iRedAPD restart after editing /opt/iredapd/settings.py.
# Matching .env value:
#   IREDAPD_RESTART_COMMAND="/usr/bin/sudo /usr/bin/systemctl restart iredapd.service"
Cmnd_Alias MXC_IREDAPD = \
    /usr/bin/systemctl restart iredapd.service

# Postfix discard recipient map rebuild and reload/restart.
# Matching .env values:
#   POSTFIX_POSTMAP_COMMAND="/usr/bin/sudo /usr/sbin/postmap"
#   POSTFIX_RELOAD_COMMAND="/usr/bin/sudo /usr/bin/systemctl reload postfix.service"
Cmnd_Alias MXC_POSTFIX = \
    /usr/sbin/postmap /etc/postfix/discard_recipients, \
    /usr/bin/systemctl reload postfix.service, \
    /usr/bin/systemctl restart postfix.service

# SOGo restart after SOGoRootPage.wox edits.
# Matching .env value:
#   SOGO_RELOAD_COMMAND="/usr/bin/sudo /usr/bin/systemctl restart sogo.service"
Cmnd_Alias MXC_SOGO = \
    /usr/bin/systemctl reload sogo.service, \
    /usr/bin/systemctl restart sogo.service

# Direct fail2ban unban action.
# Matching .env value:
#   FAIL2BAN_UNBAN_COMMAND="/usr/bin/sudo /usr/bin/fail2ban-client unban"
Cmnd_Alias MXC_FAIL2BAN = \
    /usr/bin/fail2ban-client unban *

# One-time, fixed-path filesystem preparation commands for app-managed files.
# The app edits these files directly as www-data, so use these commands once
# after installing the sudoers include to grant the narrow write access it needs.
Cmnd_Alias MXC_FILE_ACL_SETUP = \
    /usr/bin/setfacl -m u\:www-data\:rwx /etc/amavis/conf.d, \
    /usr/bin/setfacl -m u\:www-data\:rw /etc/amavis/conf.d/50-user, \
    /usr/bin/setfacl -m u\:www-data\:rwx /var/lib/dkim, \
    /usr/bin/setfacl -m u\:www-data\:rwx /opt/iredapd, \
    /usr/bin/setfacl -m u\:www-data\:rw /opt/iredapd/settings.py, \
    /usr/bin/setfacl -m u\:www-data\:rx /opt/iredapd/libs, \
    /usr/bin/setfacl -m u\:www-data\:r /opt/iredapd/libs/__init__.py, \
    /usr/bin/setfacl -m u\:www-data\:rw /etc/postfix/main.cf, \
    /usr/bin/setfacl -m u\:www-data\:rwx /etc/postfix, \
    /usr/bin/touch /etc/postfix/sender_access.pcre, \
    /usr/bin/setfacl -m u\:www-data\:rw /etc/postfix/sender_access.pcre, \
    /usr/bin/setfacl -m u\:www-data\:rw /etc/postfix/discard_recipients, \
    /usr/bin/install -d -m 0755 /var/lib/sogo/GNUstep/Library/SOGo/Templates/MainUI, \
    /usr/bin/install -m 0644 /usr/lib/GNUstep/SOGo/Templates/MainUI/SOGoRootPage.wox /var/lib/sogo/GNUstep/Library/SOGo/Templates/MainUI/SOGoRootPage.wox, \
    /usr/bin/install -m 0644 /usr/lib64/GNUstep/SOGo/Templates/MainUI/SOGoRootPage.wox /var/lib/sogo/GNUstep/Library/SOGo/Templates/MainUI/SOGoRootPage.wox, \
    /usr/bin/setfacl -m u\:www-data\:x /var/lib/sogo, \
    /usr/bin/setfacl -m u\:www-data\:x /var/lib/sogo/GNUstep, \
    /usr/bin/setfacl -m u\:www-data\:x /var/lib/sogo/GNUstep/Library, \
    /usr/bin/setfacl -m u\:www-data\:x /var/lib/sogo/GNUstep/Library/SOGo, \
    /usr/bin/setfacl -m u\:www-data\:x /var/lib/sogo/GNUstep/Library/SOGo/Templates, \
    /usr/bin/setfacl -m u\:www-data\:rwx /var/lib/sogo/GNUstep/Library/SOGo/Templates/MainUI, \
    /usr/bin/setfacl -m u\:www-data\:rw /var/lib/sogo/GNUstep/Library/SOGo/Templates/MainUI/SOGoRootPage.wox

www-data ALL=(root) NOPASSWD: MXC_AMAVISD, MXC_IREDAPD, MXC_POSTFIX, MXC_SOGO, MXC_FAIL2BAN, MXC_FILE_ACL_SETUP
